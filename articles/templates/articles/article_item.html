{% extends "base_layout.html" %}
{% load static %}
{% block title %}{{ article.title }}{% endblock title %}
{% block content %}
<head>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
    <div class="article-detail">
        <h1>{{ article.title }}</h1>
        <p>{{ article.body }}</p>
        <img src="{{ article.thumbnail.url }}" alt="">
    </div>
{% endblock content %}
