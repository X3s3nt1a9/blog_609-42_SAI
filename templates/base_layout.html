{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Default title{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body>

<header>
    <div class="logo">
        <a href="{% url 'homepage' %}">
            <img src="{% static 'logo1.png' %}" alt="logo">
        </a>
    </div>

    <div class="burger" id="burger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav" id="nav">
        <ul class="nav-menu">
            <li><a href="{% url 'homepage' %}">Home</a></li>
            <li><a href="{% url 'about' %}">About</a></li>
        </ul>

        <div class="auth-block">
            <a href="{% url 'homepage' %}" class="btn btn-primary">List</a>

            {% if user.is_authenticated %}
                <span class="username">Привет, {{ user.username }}!</span>

                <form action="{% url 'accounts:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="btn btn-outline">Login</a>
                <a href="{% url 'accounts:signup' %}" class="btn btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>
</header>

{% block content %}
{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {
    const burger = document.getElementById("burger");
    const nav = document.getElementById("nav");

    burger.addEventListener("click", function () {
        nav.classList.toggle("active");
    });
});
</script>

</body>
</html>
